{% extends "base.html" %}
{% block content %}
<div class="p-6 max-w-2xl space-y-4">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold">
      {% if mode == "create" %}🛠️ New Alert Rule{% else %}🛠️ Edit Alert Rule{% endif %}
    </h1>
    <a href="{% url 'alert_rules_list' %}" class="px-3 py-1 rounded border">
      Back
    </a>
  </div>

  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div class="p-4 rounded-lg border bg-white dark:bg-gray-900 space-y-3">
      {{ form.as_p }}
    </div>

    <button type="submit"
            class="px-4 py-2 rounded bg-green-600 text-white hover:bg-green-700">
      Save
    </button>
  </form>
</div>
{% endblock %}
