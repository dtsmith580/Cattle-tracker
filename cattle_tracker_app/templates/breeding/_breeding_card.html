<div class="bg-white rounded-2xl shadow p-4 relative">
  <button class="absolute top-2 right-2 text-gray-400 hover:text-gray-600" onclick="toggleEdit('breeding')">✏️</button>
  <h3 class="text-lg font-medium mb-3">Breeding Summary</h3>
  <p class="text-gray-700 mb-1"><strong>Last Bred:</strong> {{ cattle.breeding_attempts.last.date_bred|default:"N/A" }}</p>
  <p class="text-gray-700 mb-1"><strong>Total Calves:</strong> {{ cattle.dam_of.count }}</p>
  <p class="text-gray-700"><strong>Method:</strong> {{ cattle.breeding_attempts.last.get_method_display|default:"N/A" }}</p>
</div>
