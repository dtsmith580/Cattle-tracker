<!-- templates/health/_quick_add_health.html -->
<div class="bg-white shadow rounded-lg p-4">
  <div class="flex items-center justify-between mb-2">
    <h2 class="font-semibold">Quick Add · Health</h2>
    <a class="text-sm text-blue-700 hover:underline" href="{% url 'cattle_health_list' cattle.pk %}">View All</a>
  </div>
  <form method="post" enctype="multipart/form-data" action="{% url 'cattle_health_add' cattle.pk %}?next={% url 'view_cattle' cattle.pk %}">
    {% csrf_token %}
    <input type="hidden" name="next" value="{% url 'view_cattle' cattle.pk %}">
    <div class="grid md:grid-cols-2 gap-3">
      <input type="hidden" name="cattle" value="{{ cattle.pk }}">
      <div>
        <label class="block text-sm">Date</label>
        <input type="date" name="date" class="border rounded p-2 w-full" value="{{ today|date:'Y-m-d' }}">
      </div>
      <div>
        <label class="block text-sm">Event Type</label>
        <select name="event_type" id="qa_event_type" class="border rounded p-2 w-full">
          <option value="treatment">Treatment</option>
          <option value="vaccination">Vaccination</option>
          <option value="castration">Castration</option>
          <option value="illness">Illness</option>
          <option value="injury">Injury</option>
          <option value="deworming">Deworming</option>
          <option value="hoof_trim">Hoof Trim</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="md:col-span-2">
        <label class="block text-sm">Title</label>
        <input type="text" name="title" class="border rounded p-2 w-full" placeholder="e.g., Pinkeye treatment">
      </div>
      <div class="md:col-span-2">
        <label class="block text-sm">Notes</label>
        <textarea name="description" rows="2" class="border rounded p-2 w-full"></textarea>
      </div>

      <!-- Vaccination inline -->
      <div id="qa_vacc" class="hidden md:col-span-2 border-t pt-3 grid md:grid-cols-3 gap-3">
        <div><label class="block text-sm">Vaccine</label><input type="text" name="vaccine_name" class="border rounded p-2 w-full"></div>
        <div><label class="block text-sm">Dose</label><input type="text" name="dose" class="border rounded p-2 w-full"></div>
        <div><label class="block text-sm">Method</label><input type="text" name="administration_method" class="border rounded p-2 w-full" placeholder="SubQ/IM/etc"></div>
        <div><label class="block text-sm">Batch #</label><input type="text" name="batch_number" class="border rounded p-2 w-full"></div>
        <div><label class="block text-sm">Withdrawal</label><input type="date" name="withdrawal_date" class="border rounded p-2 w-full"></div>
      </div>

      <!-- Castration inline -->
      <div id="qa_cast" class="hidden md:col-span-2 border-t pt-3 grid md:grid-cols-3 gap-3">
        <div>
          <label class="block text-sm">Method</label>
          <select name="method" class="border rounded p-2 w-full">
            <option value="">---------</option>
            <option value="banding">Banding</option>
            <option value="surgical">Surgical</option>
            <option value="burdizzo">Burdizzo</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div><label class="block text-sm">Age (days)</label><input type="number" min="0" name="age_days" class="border rounded p-2 w-full"></div>
        <div class="md:col-span-3">
          <label class="block text-sm">Complications</label>
          <textarea name="complications" rows="2" class="border rounded p-2 w-full"></textarea>
        </div>
      </div>

      <div><label class="block text-sm">Next Due</label><input type="date" name="next_due" class="border rounded p-2 w-full"></div>
      <div><label class="block text-sm">Cost</label><input type="number" step="0.01" name="cost" class="border rounded p-2 w-full"></div>
      <div class="md:col-span-2"><label class="block text-sm">Attachment</label><input type="file" name="attachment" class="border rounded p-2 w-full"></div>
    </div>
    <div class="flex justify-end mt-3">
      <button class="px-3 py-2 rounded bg-blue-600 text-white">Add</button>
    </div>
  </form>
</div>

<script>
  const qaSel = document.getElementById('qa_event_type');
  const qaVacc = document.getElementById('qa_vacc');
  const qaCast = document.getElementById('qa_cast');
  function qaToggle() {
    qaVacc.classList.toggle('hidden', qaSel.value !== 'vaccination');
    qaCast.classList.toggle('hidden', qaSel.value !== 'castration');
  }
  qaSel.addEventListener('change', qaToggle);
  qaToggle();
</script>
