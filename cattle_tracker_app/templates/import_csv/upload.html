{% extends "base.html" %}
{% block content %}
<h2>Upload CSV</h2>
<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <input type="file" name="csv_file" accept=".csv" required class="form-control mb-3">
  <button type="submit" class="btn btn-primary">Upload</button>
</form>
{% endblock %}
