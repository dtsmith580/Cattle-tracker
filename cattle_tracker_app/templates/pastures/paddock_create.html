{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
  <h1 class="mb-3">Create Paddock</h1>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input class="form-control" type="text" name="name" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Water source</label>
      <input class="form-control" type="text" name="water_source">
    </div>
    <div class="mb-3">
      <label class="form-label">Acres</label>
      <input class="form-control" type="number" step="0.01" name="acres">
    </div>
    <div class="mb-3">
      <label class="form-label">Notes</label>
      <textarea class="form-control" name="notes" rows="4"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Pasture ID (optional)</label>
      <input class="form-control" type="number" name="pasture_id">
    </div>
    <button class="btn btn-primary" type="submit">Create</button>
    <a class="btn btn-secondary" href="{% url 'pasture_list' %}">Cancel</a>
  </form>
</div>
{% endblock %}
