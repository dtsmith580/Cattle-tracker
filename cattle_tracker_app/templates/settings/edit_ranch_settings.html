{% extends "base.html" %}
{% block content %}
<h2>Edit Your Ranch Settings</h2>
<form method="post" class="space-y-4 max-w-md">
  {% csrf_token %}
  {{ form.as_p }}
  <div class="mb-4">
  <label for="id_mailing_address" class="block text-gray-700 font-semibold mb-1">📬 Mailing Address</label>
  {{ form.mailing_address }}
</div>
  <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded">Save Settings</button>
</form>
{% endblock %}
